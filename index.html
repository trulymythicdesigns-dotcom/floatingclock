<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Flip Clock Widget</title>

<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Inter:wght@400;500&display=swap" rel="stylesheet">


<style>

:root {

    --card-light: #FCFAF5;
    --flip-light: #E9E2D6;
    --text-light: #454540;
    --muted-light: #7D786F;
    --accent-light: #93A68B;
    --border-light: #DDD5C8;


    --card-dark: #252925;
    --flip-dark: #363C36;
    --text-dark: #F3EEE5;
    --muted-dark: #B8B5AC;
    --accent-dark: #A8B8A5;
    --border-dark: #414840;

}


/* REMOVE WHITE BACKGROUND */

html,
body {

    margin:0;

    padding:0;

    width:100%;

    height:100%;

    background:transparent;

}


body {

    display:flex;

    justify-content:center;

    align-items:center;

    font-family:Inter,sans-serif;

}



/* CARD */


.clock-card {

    width:280px;

    padding:32px;

    border-radius:28px;

    text-align:center;

    background:var(--card-light);

    border:1px solid var(--border-light);

    box-shadow:
    0 12px 30px rgba(0,0,0,.08);

    transition:.4s ease;

    position:relative;

}



/* DARK MODE */


.clock-card.dark {

    background:var(--card-dark);

    border-color:var(--border-dark);

}



.clock-card.dark .flip {

    background:var(--flip-dark);

    color:var(--text-dark);

}



.clock-card.dark .colon {

    color:var(--accent-dark);

}



.clock-card.dark .date {

    color:var(--muted-dark);

}



.clock-card.dark .day {

    color:var(--accent-dark);

}



.clock-card.dark .toggle {

    color:var(--text-dark);

}



/* TOGGLE */


.toggle {

    position:absolute;

    top:12px;

    right:15px;

    border:none;

    background:none;

    cursor:pointer;

    font-size:16px;

    color:var(--text-light);

}



/* CLOCK */


.clock {

    display:flex;

    justify-content:center;

    align-items:center;

    gap:5px;

    margin-top:10px;

}



.flip {

    width:48px;

    height:62px;

    border-radius:10px;

    background:var(--flip-light);

    display:flex;

    align-items:center;

    justify-content:center;

    position:relative;

    overflow:hidden;

    font-family:"DM Serif Display",serif;

    font-size:38px;

    color:var(--text-light);

    box-shadow:

    inset 0 -1px rgba(0,0,0,.08);

}



.flip::after {

    content:"";

    position:absolute;

    top:50%;

    left:0;

    height:1px;

    width:100%;

    background:rgba(0,0,0,.12);

}



.flip.animate {

    animation:flip .35s ease;

}



@keyframes flip {


0% {

transform:rotateX(0deg);

}


50% {

transform:rotateX(-90deg);

}


100% {

transform:rotateX(0deg);

}


}



.colon {

    font-family:"DM Serif Display",serif;

    font-size:34px;

    color:var(--accent-light);

}



.ampm {

    font-size:13px;

    margin-left:6px;

    color:var(--accent-light);

    font-weight:500;

}



/* DATE */


.date {

    margin-top:22px;

    color:var(--muted-light);

    font-size:14px;

    line-height:1.6;

}



.day {

    font-weight:500;

    color:var(--accent-light);

}



</style>

</head>



<body>


<div class="clock-card" id="card">


<button class="toggle" id="toggle">
☾
</button>


<div class="clock">


<div class="flip" id="h1">0</div>

<div class="flip" id="h2">0</div>


<div class="colon">:</div>


<div class="flip" id="m1">0</div>

<div class="flip" id="m2">0</div>


<div class="ampm" id="ampm">
AM
</div>


</div>



<div class="date">

<div class="day" id="day"></div>

<div id="fullDate"></div>

</div>


</div>




<script>


const card = document.getElementById("card");

const toggle = document.getElementById("toggle");



// LOAD SAVED THEME


if(localStorage.getItem("clock-theme") === "dark") {

    card.classList.add("dark");

    toggle.textContent="☀";

}



// TOGGLE THEME


toggle.onclick=function(){


card.classList.toggle("dark");


let dark = card.classList.contains("dark");


toggle.textContent = dark ? "☀" : "☾";


localStorage.setItem(
"clock-theme",
dark ? "dark" : "light"
);


};





function updateClock(){


const now=new Date();


let hours=now.getHours();

let minutes=now.getMinutes();


let ampm=hours>=12 ? "PM":"AM";


hours=hours%12 || 12;



let time=

String(hours).padStart(2,"0")

+

String(minutes).padStart(2,"0");



let ids=[
"h1",
"h2",
"m1",
"m2"
];



ids.forEach((id,index)=>{


let element=document.getElementById(id);


if(element.textContent !== time[index]){


element.classList.remove("animate");


void element.offsetWidth;


element.classList.add("animate");


element.textContent=time[index];


}


});



document.getElementById("ampm").textContent=ampm;



document.getElementById("day").textContent=

now.toLocaleDateString([],{

weekday:"long"

});



document.getElementById("fullDate").textContent=

now.toLocaleDateString([],{

month:"long",

day:"numeric",

year:"numeric"

});



}



updateClock();


setInterval(updateClock,1000);



</script>


</body>

</html>
