<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Notion Flip Clock</title>

<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Inter:wght@400;500&display=swap" rel="stylesheet">

<style>

html, body {
    margin:0;
    padding:0;
    background:transparent !important;
    overflow:hidden;
}

body {
    display:flex;
    justify-content:center;
    align-items:flex-start;
    font-family:Inter,sans-serif;
}


/* CARD */

.card {

    margin-top:5px;

    width:270px;

    padding:24px;

    border-radius:26px;

    background:#FCFAF5;

    border:1px solid #DDD5C8;

    text-align:center;

    position:relative;

    box-shadow:0 8px 20px rgba(0,0,0,.08);

    transition:.3s ease;

}


.card.dark {

    background:#252925;

    border-color:#414840;

    box-shadow:0 8px 20px rgba(0,0,0,.25);

}



/* CONTROLS LEFT */

.controls {

    position:absolute;

    top:12px;

    left:14px;

    display:flex;

    gap:8px;

}


button {

    border:none;

    background:none;

    cursor:pointer;

    font-size:15px;

}



/* CLOCK */

.clock {

    margin-top:18px;

    display:flex;

    justify-content:center;

    align-items:center;

    gap:5px;

}


.flip {

    width:45px;

    height:58px;

    border-radius:9px;

    background:#E9E2D6;

    display:flex;

    justify-content:center;

    align-items:center;

    font-family:"DM Serif Display",serif;

    font-size:36px;

    color:#454540;

    position:relative;

    overflow:hidden;

}


.dark .flip {

    background:#363C36;

    color:#F5F1E8;

}


.flip:after {

    content:"";

    position:absolute;

    width:100%;

    height:1px;

    top:50%;

    background:rgba(0,0,0,.15);

}



.flip.animate {

    animation:flip .35s ease;

}



@keyframes flip {

    0% {transform:rotateX(0);}
    50% {transform:rotateX(-90deg);}
    100% {transform:rotateX(0);}

}



.colon {

    font-family:"DM Serif Display",serif;

    font-size:32px;

    color:#93A68B;

}



.ampm {

    font-size:12px;

    color:#93A68B;

    margin-left:5px;

}



/* DATE */

.date {

    margin-top:16px;

    color:#817B72;

    font-size:13px;

    line-height:1.6;

}



.dark .date {

    color:#B8B5AC;

}


.day {

    color:#657565;

    font-weight:500;

}


.dark .day {

    color:#A8B8A5;

}


</style>

</head>


<body>


<div class="card" id="card">


<div class="controls">

<button id="theme">☾</button>

<button id="settings">⚙</button>

</div>



<div class="clock">


<div class="flip" id="h1">0</div>

<div class="flip" id="h2">0</div>

<div class="colon">:</div>

<div class="flip" id="m1">0</div>

<div class="flip" id="m2">0</div>

<div class="ampm" id="ampm"></div>


</div>


<div class="date">

<div class="day" id="day"></div>

<div id="date"></div>

</div>


</div>




<script>


const card=document.getElementById("card");

const theme=document.getElementById("theme");



theme.onclick=()=>{

card.classList.toggle("dark");

theme.textContent =
card.classList.contains("dark") ? "☀" : "☾";

};



function updateClock(){


const now=new Date();


let hours=now.getHours();

let minutes=now.getMinutes();


let ampm=hours>=12 ? "PM":"AM";


hours=hours%12 || 12;


let time=

String(hours).padStart(2,"0")+

String(minutes).padStart(2,"0");



["h1","h2","m1","m2"].forEach((id,i)=>{


let box=document.getElementById(id);


if(box.textContent!==time[i]){


box.classList.remove("animate");

void box.offsetWidth;

box.classList.add("animate");

box.textContent=time[i];


}


});



document.getElementById("ampm").textContent=ampm;



document.getElementById("day").textContent=

now.toLocaleDateString([],{

weekday:"long"

});



document.getElementById("date").textContent=

now.toLocaleDateString([],{

month:"long",

day:"numeric",

year:"numeric"

});


}


updateClock();

setInterval(updateClock,1000);


</script>


</body>
</html>
