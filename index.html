<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Global Flip Clock</title>

<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Inter:wght@400;500&display=swap" rel="stylesheet">

<style>

html, body {
    margin:0;
    padding:0;
    
    width:max-content;
    height:max-content;

    min-height:0;
    
    background:transparent !important;
    overflow:hidden;
    font-family:Inter,sans-serif;
}

body {
    display:flex;
    justify-content:center;
    align-items:flex-start;
}


/* CARD */

.card {

    margin:0;
    width:290px;

    padding:24px 28px;

    border-radius:28px;

    background:#FCFAF5;

    border:1px solid #DDD5C8;

    text-align:center;

    position:relative;

    color:#454540;

    box-shadow:0 10px 25px rgba(0,0,0,.08);

    transition:.3s;

}


.card.dark {

    background:#252925;

    border-color:#414840;

    color:#F5F1E8;

}



/* BUTTONS */

.top-buttons {

    position:absolute;

    top:12px;

    left:14px;

    display:flex;

    gap:8px;

}


button {

    border:none;

    background:none;

    cursor:pointer;

    font-size:15px;

}



/* CLOCK */

.clock {

    margin-top:15px;

    display:flex;

    justify-content:center;

    align-items:center;

    gap:5px;

}


.flip {

    width:46px;

    height:60px;

    border-radius:10px;

    background:#E9E2D6;

    display:flex;

    justify-content:center;

    align-items:center;

    font-family:"DM Serif Display",serif;

    font-size:38px;

    position:relative;

    overflow:hidden;

}


.dark .flip {

    background:#363C36;

    color:#F5F1E8;

}


.flip:after {

    content:"";

    position:absolute;

    width:100%;

    height:1px;

    background:rgba(0,0,0,.15);

    top:50%;

}


.flip.animate {

    animation:flip .35s;

}


@keyframes flip {

0%{
transform:rotateX(0);
}

50%{
transform:rotateX(-90deg);
}

100%{
transform:rotateX(0);
}

}


.colon {

    font-size:32px;

    color:#93A68B;

}


.ampm {

    margin-left:5px;

    font-size:12px;

    color:#93A68B;

}



/* DATE */

.date {

    margin-top:18px;

    font-size:14px;

    color:#817B72;

}


.dark .date {

    color:#B8B5AC;

}


.day {

    color:#657565;

    font-weight:500;

}


.dark .day {

    color:#A8B8A5;

}



/* LOCATION */

.location {

    margin-top:10px;

    font-size:12px;

    color:#93A68B;

}



/* SETTINGS */

.settings {

    display:none;

    margin-top:20px;

    text-align:left;

    font-size:13px;

}


.settings.show {

    display:block;

}


select {

    width:100%;

    padding:8px;

    margin:6px 0 12px;

    border-radius:10px;

    border:1px solid #D8D0C4;

    background:#F3EEE5;

}


.dark select {

    background:#363C36;

    color:white;

    border-color:#555;

}


.save {

    width:100%;

    padding:9px;

    border-radius:20px;

    background:#93A68B;

    color:white;

}

* {
    scrollbar-width:none;
}

::-webkit-scrollbar {
    display:none;
}

</style>

</head>


<body>


<div class="card" id="card">


<div class="top-buttons">

<button id="settingsBtn">⚙</button>

<button id="themeBtn">☾</button>

</div>



<div class="clock">


<div class="flip" id="h1">0</div>
<div class="flip" id="h2">0</div>

<div class="colon">:</div>

<div class="flip" id="m1">0</div>
<div class="flip" id="m2">0</div>

<div class="ampm" id="ampm"></div>


</div>



<div class="date">

<div class="day" id="day"></div>

<div id="date"></div>

</div>



<div class="location" id="location">

</div>



<div class="settings" id="settings">


<label>Location</label>

<select id="place">

<option value="America/Toronto|Toronto, Canada">
Toronto, Canada
</option>

<option value="America/New_York|New York, USA">
New York, USA
</option>

<option value="America/Los_Angeles|Los Angeles, USA">
Los Angeles, USA
</option>

<option value="Europe/London|London, UK">
London, UK
</option>

<option value="Europe/Paris|Paris, France">
Paris, France
</option>

<option value="Asia/Dubai|Dubai, UAE">
Dubai, UAE
</option>

<option value="Asia/Tokyo|Tokyo, Japan">
Tokyo, Japan
</option>

<option value="Australia/Sydney|Sydney, Australia">
Sydney, Australia
</option>

</select>


<label>Format</label>

<select id="format">

<option value="12">
12 Hour
</option>

<option value="24">
24 Hour
</option>

</select>


<button class="save" id="save">
Save
</button>


</div>


</div>




<script>


const card=document.getElementById("card");

const settings=document.getElementById("settings");

let timezone="America/Toronto";

let locationName="Toronto, Canada";

let format="12";



document.getElementById("settingsBtn").onclick=()=>{

settings.classList.toggle("show");

};



document.getElementById("themeBtn").onclick=()=>{

card.classList.toggle("dark");

document.getElementById("themeBtn").textContent=

card.classList.contains("dark") ? "☀" : "☾";

};



document.getElementById("save").onclick=()=>{


let value=document.getElementById("place").value.split("|");


timezone=value[0];

locationName=value[1];


format=document.getElementById("format").value;


settings.classList.remove("show");


updateClock();


};




function updateClock(){


let now=new Date();



let options={

timeZone:timezone,

hour:"numeric",

minute:"numeric",

hour12:format==="12"

};



let time=new Intl.DateTimeFormat([],options)
.format(now);



let parts=time.match(/\d+|\w+/g);



let hour=parts[0];

let minute=parts[1];

let ampm=parts[2] || "";



let display=String(hour).padStart(2,"0")+String(minute).padStart(2,"0");



["h1","h2","m1","m2"].forEach((id,i)=>{


let box=document.getElementById(id);


if(box.textContent!==display[i]){


box.classList.remove("animate");

void box.offsetWidth;

box.classList.add("animate");

box.textContent=display[i];


}


});



document.getElementById("ampm").textContent=ampm;



document.getElementById("day").textContent=

new Intl.DateTimeFormat([],{

timeZone:timezone,

weekday:"long"

}).format(now);



document.getElementById("date").textContent=

new Intl.DateTimeFormat([],{

timeZone:timezone,

month:"long",

day:"numeric",

year:"numeric"

}).format(now);



document.getElementById("location").textContent=

"📍 "+locationName;


}



updateClock();

setInterval(updateClock,1000);

    
window.addEventListener("load", () => {

    document.body.style.height =
    document.querySelector(".card").offsetHeight + "px";
});

</script>


</body>
</html>
